services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: spendly
      POSTGRES_USER: spendly
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spendly"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  nats:
    image: nats:latest
    command: "-js -m 8222"
    volumes:
      - nats_data:/data
    ports:
      - "4222:4222"
      - "8222:8222"

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_KEEP_ALIVE=24h

volumes:
  postgres_data:
  qdrant_data:
  redis_data:
  nats_data:
  ollama_models:
